<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KanbanFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-page:         #f4f5f7;
      --bg-header:       #0f0f1a;
      --bg-column:       #ffffff;
      --bg-card:         #ffffff;
      --bg-footer:       #0f0f1a;
      --bg-input:        rgba(255,255,255,.08);
      --bg-input-focus:  rgba(255,255,255,.15);
      --text-primary:    #1a1a2e;
      --text-secondary:  #6b7280;
      --text-muted:      #9ca3af;
      --text-inverse:    #f9fafb;
      --border:          #e5e7eb;
      --border-card:     #f0f0f0;
      --shadow-sm:       0 1px 3px rgba(0,0,0,.05);
      --shadow-md:       0 4px 20px rgba(0,0,0,.08);
      --shadow-lift:     0 12px 32px rgba(0,0,0,.12);
      --shadow-glow-todo: 0 0 0 2px rgba(99,102,241,.3);
      --shadow-glow-prog: 0 0 0 2px rgba(245,158,11,.3);
      --shadow-glow-done: 0 0 0 2px rgba(16,185,129,.3);
      --accent-todo:     #6366f1;
      --accent-prog:     #f59e0b;
      --accent-done:     #10b981;
      --accent-todo-bg:  #eef2ff;
      --accent-prog-bg:  #fffbeb;
      --accent-done-bg:  #ecfdf5;
      --accent-todo-bg2: rgba(99,102,241,.08);
      --accent-prog-bg2: rgba(245,158,11,.08);
      --accent-done-bg2: rgba(16,185,129,.08);
      --gradient-brand:  linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      --gradient-header: linear-gradient(135deg, #0f0f1a 0%, #1a1035 100%);
      --btn-primary:     #6366f1;
      --btn-primary-hov: #4f46e5;
      --radius-sm:       8px;
      --radius-md:       12px;
      --radius-lg:       16px;
      --radius-xl:       20px;
      --font-body:       'Inter', system-ui, sans-serif;
      --font-mono:       'JetBrains Mono', monospace;
      --transition:      .2s cubic-bezier(.4,0,.2,1);
      --drag-bg:         rgba(99,102,241,.06);
    }

    /* ── Dark Theme ─────────────────────────────────────────────────────────── */
    [data-theme="dark"] {
      --bg-page:         #0c0d14;
      --bg-header:       #080910;
      --bg-column:       #13141f;
      --bg-card:         #1a1c2e;
      --bg-footer:       #080910;
      --bg-input:        rgba(255,255,255,.06);
      --bg-input-focus:  rgba(255,255,255,.12);
      --text-primary:    #e8eaf0;
      --text-secondary:  #8b92a8;
      --text-muted:      #5a6178;
      --border:          #1f2237;
      --border-card:     #252840;
      --shadow-sm:       0 1px 3px rgba(0,0,0,.3);
      --shadow-md:       0 4px 20px rgba(0,0,0,.4);
      --shadow-lift:     0 12px 32px rgba(0,0,0,.5);
      --accent-todo-bg:  rgba(99,102,241,.12);
      --accent-prog-bg:  rgba(245,158,11,.1);
      --accent-done-bg:  rgba(16,185,129,.1);
      --accent-todo-bg2: rgba(99,102,241,.06);
      --accent-prog-bg2: rgba(245,158,11,.06);
      --accent-done-bg2: rgba(16,185,129,.06);
      --gradient-header: linear-gradient(135deg, #080910 0%, #100c1e 100%);
      --drag-bg:         rgba(99,102,241,.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    header {
      background: var(--gradient-header);
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .65rem;
      flex-shrink: 0;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--gradient-brand);
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
    }
    .brand-name {
      font-size: 1.2rem;
      font-weight: 800;
      color: #f9fafb;
      letter-spacing: -.4px;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Environment badge */
    .env-badge {
      font-family: var(--font-mono);
      font-size: .65rem;
      font-weight: 600;
      padding: .25rem .65rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .1em;
      border: 1px solid;
      transition: background var(--transition), color var(--transition);
    }
    .env-badge.production  { background: rgba(16,185,129,.15); color: #6ee7b7; border-color: rgba(16,185,129,.3); }
    .env-badge.development { background: rgba(99,102,241,.15); color: #a5b4fc; border-color: rgba(99,102,241,.3); }
    .env-badge.local       { background: rgba(156,163,175,.1); color: #9ca3af; border-color: rgba(156,163,175,.2); }

    /* Add task form */
    .add-form {
      display: flex;
      gap: .5rem;
      margin-left: auto;
      align-items: center;
      flex-wrap: wrap;
    }
    .add-form input {
      padding: .6rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,.1);
      background: var(--bg-input);
      color: var(--text-inverse);
      font-family: var(--font-body);
      font-size: .85rem;
      width: 260px;
      outline: none;
      transition: all var(--transition);
    }
    .add-form input::placeholder { color: rgba(255,255,255,.3); }
    .add-form input:focus {
      background: var(--bg-input-focus);
      border-color: rgba(99,102,241,.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    .btn-primary {
      padding: .6rem 1.2rem;
      background: var(--gradient-brand);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(99,102,241,.3);
    }
    .btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,.4); }
    .btn-primary:active { transform: translateY(0) scale(.97); }

    /* ── Board ───────────────────────────────────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      padding: 1.75rem 2rem;
      flex: 1;
      align-items: start;
    }
    @media (max-width: 900px) {
      .board { grid-template-columns: 1fr; }
      .add-form input { width: 200px; }
    }

    /* ── Column ──────────────────────────────────────────────────────────────── */
    .column {
      background: var(--bg-column);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all var(--transition);
    }

    .col-header {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    /* Gradient top accent bar per column */
    .col-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    #col-todo       .col-header::before { background: linear-gradient(90deg, #6366f1, #818cf8); }
    #col-inprogress .col-header::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    #col-done       .col-header::before { background: linear-gradient(90deg, #10b981, #34d399); }

    .col-title-wrap { display: flex; align-items: center; gap: .6rem; }
    .col-icon {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      font-size: .85rem;
    }
    #col-todo       .col-icon { background: var(--accent-todo-bg); }
    #col-inprogress .col-icon { background: var(--accent-prog-bg); }
    #col-done       .col-icon { background: var(--accent-done-bg); }

    .col-title {
      font-size: .9rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -.2px;
    }
    .col-count {
      font-family: var(--font-mono);
      font-size: .7rem;
      font-weight: 600;
      padding: .2rem .55rem;
      border-radius: 999px;
      transition: background var(--transition);
    }
    #col-todo       .col-count { background: var(--accent-todo-bg); color: var(--accent-todo); }
    #col-inprogress .col-count { background: var(--accent-prog-bg); color: var(--accent-prog); }
    #col-done       .col-count { background: var(--accent-done-bg); color: var(--accent-done); }

    /* Task list container — drop zone */
    .task-list {
      padding: .75rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      min-height: 120px;
      transition: background .15s ease;
    }
    .task-list.drag-over {
      background: var(--drag-bg);
      border-radius: 0 0 var(--radius-xl) var(--radius-xl);
    }

    /* ── Task Card ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-md);
      padding: .75rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
      animation: cardIn .28s cubic-bezier(.34,1.56,.64,1);
      cursor: grab;
      user-select: none;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(-10px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--border);
    }
    .card:active {
      cursor: grabbing;
    }
    .card.dragging {
      opacity: .4;
      transform: scale(.95);
      box-shadow: none;
    }

    /* Drag handle indicator */
    .card-drag-handle {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-top: 4px;
      opacity: .25;
      transition: opacity var(--transition);
      flex-shrink: 0;
    }
    .card:hover .card-drag-handle { opacity: .6; }
    .card-drag-handle span {
      display: block;
      width: 10px;
      height: 2px;
      background: var(--text-secondary);
      border-radius: 1px;
    }

    .card-title {
      flex: 1;
      font-size: .85rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.5;
      word-break: break-word;
      padding-top: 1px;
    }
    .card-actions {
      display: flex;
      gap: .3rem;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .card:hover .card-actions { opacity: 1; }

    .btn-icon {
      width: 28px; height: 28px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: .8rem;
      display: grid;
      place-items: center;
      transition: all var(--transition);
      line-height: 1;
    }
    .btn-icon:active { transform: scale(.88); }

    .btn-move {
      background: var(--bg-page);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-move:hover {
      background: var(--accent-todo-bg2);
      color: var(--accent-todo);
      border-color: rgba(99,102,241,.3);
    }
    .btn-del {
      background: rgba(239,68,68,.06);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,.15);
    }
    .btn-del:hover {
      background: rgba(239,68,68,.12);
      border-color: rgba(239,68,68,.3);
    }

    /* ── Empty State ─────────────────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      padding: 2rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .empty-icon {
      font-size: 2rem;
      opacity: .3;
      filter: grayscale(.5);
    }
    .empty-state p { font-size: .8rem; font-weight: 500; }
    .empty-state .drag-hint {
      font-size: .72rem;
      opacity: .6;
      font-style: italic;
    }

    /* ── Status Footer ───────────────────────────────────────────────────────── */
    footer {
      background: var(--bg-footer);
      padding: .7rem 2rem;
      display: flex;
      align-items: center;
      gap: 2.5rem;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,.04);
      transition: background var(--transition);
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-family: var(--font-mono);
      font-size: .7rem;
      color: rgba(255,255,255,.4);
    }
    .status-item span.label { color: rgba(255,255,255,.25); }
    .status-item span.value { color: rgba(255,255,255,.8); font-weight: 500; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #10b981;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(16,185,129,.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px rgba(16,185,129,.5); }
      50%      { opacity: .4; box-shadow: 0 0 2px rgba(16,185,129,.2); }
    }

    /* ── Loading shimmer ─────────────────────────────────────────────────────── */
    .skeleton {
      height: 52px;
      border-radius: var(--radius-md);
      background: linear-gradient(90deg, var(--border) 25%, var(--bg-page) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Drop placeholder ────────────────────────────────────────────────────── */
    .drop-placeholder {
      border: 2px dashed var(--accent-todo);
      border-radius: var(--radius-md);
      min-height: 48px;
      background: var(--accent-todo-bg2);
      transition: all .15s ease;
      opacity: .6;
    }

    /* ── Toast notification ──────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-header);
      color: var(--text-inverse);
      padding: .6rem 1.4rem;
      border-radius: var(--radius-md);
      font-size: .8rem;
      font-weight: 600;
      box-shadow: var(--shadow-lift);
      opacity: 0;
      transition: all .3s cubic-bezier(.4,0,.2,1);
      z-index: 999;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,.08);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-icon">📋</div>
    <span class="brand-name">KanbanFlow</span>
    <span class="env-badge local" id="env-badge">local</span>
  </div>

  <div class="add-form">
    <input
      type="text"
      id="task-input"
      placeholder="New task title…"
      autocomplete="off"
    />
    <button class="btn-primary" onclick="addTask()">+ Add Task</button>
  </div>
</header>

<!-- ── Board ───────────────────────────────────────────────────────────────── -->
<main class="board">

  <div class="column" id="col-todo">
    <div class="col-header">
      <div class="col-title-wrap">
        <div class="col-icon">📝</div>
        <span class="col-title">To-Do</span>
      </div>
      <span class="col-count" id="count-todo">0</span>
    </div>
    <div class="task-list" id="list-todo" data-column="todo">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

  <div class="column" id="col-inprogress">
    <div class="col-header">
      <div class="col-title-wrap">
        <div class="col-icon">⚡</div>
        <span class="col-title">In Progress</span>
      </div>
      <span class="col-count" id="count-inprogress">0</span>
    </div>
    <div class="task-list" id="list-inprogress" data-column="inprogress">
      <div class="skeleton"></div>
    </div>
  </div>

  <div class="column" id="col-done">
    <div class="col-header">
      <div class="col-title-wrap">
        <div class="col-icon">✅</div>
        <span class="col-title">Done</span>
      </div>
      <span class="col-count" id="count-done">0</span>
    </div>
    <div class="task-list" id="list-done" data-column="done">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

</main>

<!-- ── Status Footer ───────────────────────────────────────────────────────── -->
<footer>
  <div class="status-item">
    <div class="status-dot"></div>
    <span class="label">status</span>
    <span class="value" id="f-status">…</span>
  </div>
  <div class="status-item">
    <span class="label">version</span>
    <span class="value" id="f-version">…</span>
  </div>
  <div class="status-item">
    <span class="label">environment</span>
    <span class="value" id="f-env">…</span>
  </div>
</footer>

<!-- ── Toast ───────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── JavaScript ──────────────────────────────────────────────────────────── -->
<script>
  'use strict';

  const COLS      = ['todo', 'inprogress', 'done'];
  const COL_LABEL = { todo: 'To-Do', inprogress: 'In Progress', done: 'Done' };

  let draggedTaskId = null;

  // ── Rendering ─────────────────────────────────────────────────────────────

  function render(tasks) {
    COLS.forEach(col => {
      const list  = document.getElementById(`list-${col}`);
      const count = document.getElementById(`count-${col}`);
      const mine  = tasks.filter(t => t.column === col);

      count.textContent = mine.length;

      if (mine.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">${col === 'todo' ? '📝' : col === 'inprogress' ? '⚡' : '🎉'}</div>
            <p>No tasks</p>
            <span class="drag-hint">Drag tasks here</span>
          </div>`;
        return;
      }

      list.innerHTML = mine.map(t => cardHTML(t)).join('');

      // Attach drag events to each card
      list.querySelectorAll('.card').forEach(card => {
        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragend',   handleDragEnd);
      });
    });
  }

  function cardHTML(task) {
    const idx      = COLS.indexOf(task.column);
    const canLeft  = idx > 0;
    const canRight = idx < COLS.length - 1;

    const leftBtn  = canLeft
      ? `<button class="btn-icon btn-move"
           title="Move to ${COL_LABEL[COLS[idx-1]]}"
           onclick="event.stopPropagation(); moveTask('${task.id}','${COLS[idx-1]}')">←</button>`
      : '';
    const rightBtn = canRight
      ? `<button class="btn-icon btn-move"
           title="Move to ${COL_LABEL[COLS[idx+1]]}"
           onclick="event.stopPropagation(); moveTask('${task.id}','${COLS[idx+1]}')">→</button>`
      : '';
    const delBtn   = `<button class="btn-icon btn-del"
           title="Delete task"
           onclick="event.stopPropagation(); deleteTask('${task.id}')">✕</button>`;

    return `
      <div class="card" id="card-${task.id}" draggable="true" data-task-id="${task.id}">
        <div class="card-drag-handle">
          <span></span><span></span><span></span>
        </div>
        <span class="card-title">${escHtml(task.title)}</span>
        <div class="card-actions">${leftBtn}${rightBtn}${delBtn}</div>
      </div>`;
  }

  function escHtml(str) {
    return str.replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // ── Drag & Drop ──────────────────────────────────────────────────────────

  function handleDragStart(e) {
    draggedTaskId = e.target.closest('.card').dataset.taskId;
    e.target.closest('.card').classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggedTaskId);
  }

  function handleDragEnd(e) {
    e.target.closest('.card')?.classList.remove('dragging');
    draggedTaskId = null;
    document.querySelectorAll('.task-list').forEach(l => l.classList.remove('drag-over'));
    document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
  }

  // Set up drop zones on each task-list
  document.querySelectorAll('.task-list').forEach(list => {
    list.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      list.classList.add('drag-over');

      // Add a placeholder if there isn't one
      if (!list.querySelector('.drop-placeholder')) {
        const placeholder = document.createElement('div');
        placeholder.className = 'drop-placeholder';
        list.appendChild(placeholder);
      }
    });

    list.addEventListener('dragleave', e => {
      // Only handle leaving the list itself, not children
      if (!list.contains(e.relatedTarget)) {
        list.classList.remove('drag-over');
        list.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
      }
    });

    list.addEventListener('drop', e => {
      e.preventDefault();
      list.classList.remove('drag-over');
      list.querySelectorAll('.drop-placeholder').forEach(p => p.remove());

      const taskId    = e.dataTransfer.getData('text/plain');
      const newColumn = list.dataset.column;

      if (taskId && newColumn) {
        moveTask(taskId, newColumn);
        showToast(`Moved to ${COL_LABEL[newColumn]}`);
      }
    });
  });

  // ── Toast ─────────────────────────────────────────────────────────────────

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // ── API helpers ───────────────────────────────────────────────────────────

  async function fetchTasks() {
    try {
      const res   = await fetch('/tasks');
      const tasks = await res.json();
      render(tasks);
    } catch (err) {
      console.error('Failed to load tasks:', err);
    }
  }

  async function addTask() {
    const input = document.getElementById('task-input');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }

    try {
      await fetch('/tasks', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ title }),
      });
      input.value = '';
      fetchTasks();
      showToast('Task added!');
    } catch (err) {
      console.error('Failed to add task:', err);
    }
  }

  async function moveTask(id, column) {
    try {
      await fetch(`/tasks/${id}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ column }),
      });
      fetchTasks();
    } catch (err) {
      console.error('Failed to move task:', err);
    }
  }

  async function deleteTask(id) {
    try {
      await fetch(`/tasks/${id}`, { method: 'DELETE' });
      fetchTasks();
      showToast('Task deleted');
    } catch (err) {
      console.error('Failed to delete task:', err);
    }
  }

  // ── Status bar ────────────────────────────────────────────────────────────

  async function fetchStatus() {
    try {
      const res  = await fetch('/status');
      const data = await res.json();

      document.getElementById('f-status').textContent  = data.status;
      document.getElementById('f-version').textContent = data.version;
      document.getElementById('f-env').textContent     = data.environment;

      // Update the header badge
      const badge = document.getElementById('env-badge');
      badge.textContent = data.environment;
      badge.className   = `env-badge ${data.environment}`;
    } catch (_) { /* silently ignore */ }
  }

  // ── Enter-key shortcut ────────────────────────────────────────────────────

  document.getElementById('task-input')
    .addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  // ── Init ──────────────────────────────────────────────────────────────────

  fetchTasks();
  fetchStatus();
</script>

</body>
</html>
